<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ Morse Admin Command Center</title>
<style>
:root{--bg:#0a0a0a;--pn:#1a1a1a;--bd:#2a2a2a;--tx:#c8c8c8;--ac:#f0c040;--sc:#4caf50;--er:#f44336;--wa:#ff9800;--in:#2196F3;--pm:#ff69b4;--mo:#4fc3f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--tx);padding:10px;min-height:100vh}
.c{max-width:1000px;margin:0 auto}
h1{color:var(--ac);text-align:center;letter-spacing:4px;margin-bottom:10px;font-size:1.3rem}
.login-box{background:var(--pn);border:1px solid var(--bd);border-radius:10px;padding:30px;text-align:center;max-width:400px;margin:50px auto}
.login-box input{width:100%;padding:10px;margin:10px 0;background:#0f0f0f;border:1px solid var(--bd);color:var(--ac);font-family:inherit;font-size:.9rem;border-radius:5px;text-align:center;letter-spacing:3px}
.login-box button{padding:10px 30px;background:var(--sc);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:bold;letter-spacing:2px;font-size:.8rem}
.panel{display:none}
.panel.vis{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:var(--pn);border:1px solid var(--bd);border-radius:8px;padding:12px}
.card h3{color:var(--ac);letter-spacing:2px;font-size:.7rem;margin-bottom:8px}
.chat-box{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:5px;height:350px;overflow-y:auto;padding:8px;font-size:.6rem;letter-spacing:1px;line-height:1.4;margin-bottom:8px}
.chat-box::-webkit-scrollbar{width:3px}.chat-box::-webkit-scrollbar-track{background:#0a0a0a}.chat-box::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.msg{margin-bottom:3px;padding:3px 6px;border-radius:4px;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
.ms{background:#0a1a0a;border-left:2px solid var(--sc)}.mr{background:#1a0a00;border-left:2px solid var(--wa)}.mp{background:#1a0020;border-left:2px solid var(--pm)}.ma{background:#0a0a1a;border-left:2px solid var(--in)}.my{background:0;border:none;text-align:center;color:#444;font-style:italic;font-size:.5rem}
.ml{font-size:.45rem;letter-spacing:2px;opacity:.7}.ms .ml{color:var(--sc)}.mr .ml{color:var(--wa)}.mp .ml{color:var(--pm)}.ma .ml{color:var(--in)}
.mm{color:var(--mo);letter-spacing:2px;font-size:.5rem}.mtx{color:#ddd}
.muted-msg{opacity:.4;border-left-color:#444!important}
.client-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:.6rem;gap:4px}
.client-row .name{color:var(--ac);font-weight:bold}
.client-row .muted-tag{color:var(--wa);font-size:.5rem}
.client-row .admin-tag{color:var(--in);font-size:.5rem}
.btns{display:flex;gap:3px}
.btns button{padding:2px 6px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:.5rem;font-weight:bold}
.btn-pm{background:var(--in);color:#fff}.btn-mute{background:#607d8b;color:#fff}.btn-kick{background:var(--wa);color:#000}.btn-ban{background:var(--er);color:#fff}.btn-unmute{background:var(--sc);color:#fff}
.input-row{display:flex;gap:6px;margin-bottom:6px}
.input-row input{flex:1;padding:6px 8px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:4px;color:var(--ac);font-family:inherit;font-size:.65rem}
.input-row select{padding:6px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:4px;color:var(--ac);font-family:inherit;font-size:.65rem;max-width:140px}
.input-row button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:bold;font-size:.6rem;white-space:nowrap}
.btn-send{background:var(--sc);color:#fff}.btn-bc{background:var(--ac);color:#000}.btn-pms{background:var(--in);color:#fff}
select option{background:#1a1a1a;color:var(--tx)}
.stat-num{font-size:1.5rem;color:var(--sc);text-align:center}
.stat-label{text-align:center;font-size:.5rem;color:#666}
.quick-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.quick-actions button{padding:3px 8px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:.5rem;font-weight:bold}
.btn-mute-all{background:#607d8b;color:#fff}.btn-unmute-all{background:var(--sc);color:#fff}.btn-kick-all{background:var(--er);color:#fff}
</style>
</head>
<body>
<div class="c">
<h1>🛡️ ADMIN COMMAND CENTER</h1>

<div class="login-box" id="loginBox">
<h3 style="color:var(--ac);margin-bottom:10px">Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter admin password">
<button onclick="login()">🔓 LOGIN</button>
<div id="loginErr" style="color:var(--er);font-size:.7rem;margin-top:8px"></div>
</div>

<div class="panel" id="panel">
<div class="grid">
<div class="card">
<h3>📊 STATS</h3>
<div class="stat-num" id="clientCount">0</div>
<div class="stat-label">clients online</div>
<div class="stat-num" id="mutedCount" style="color:var(--wa);font-size:1rem;margin-top:8px">0</div>
<div class="stat-label">muted</div>
<div class="quick-actions">
<button class="btn-mute-all" onclick="muteAll()">🔇 Mute All</button>
<button class="btn-unmute-all" onclick="unmuteAll()">🔊 Unmute All</button>
<button class="btn-kick-all" onclick="kickAll()">🚫 Kick All</button>
</div>
</div>
<div class="card">
<h3>👥 CLIENTS</h3>
<div id="clientList" style="max-height:200px;overflow-y:auto;color:#666;font-size:.6rem">Loading...</div>
</div>
</div>

<div class="card" style="margin-bottom:10px">
<h3>💬 LIVE CHAT & ADMIN CONTROLS</h3>
<div class="chat-box" id="chatBox"><div class="my">Waiting for messages...</div></div>
<div class="input-row">
<select id="pmTarget"><option value="all">📢 Everyone</option></select>
<input type="text" id="chatMsg" placeholder="Type message or PM..." maxlength="300">
<button class="btn-send" onclick="sendMsg()" id="btnSendMsg">📤 SEND</button>
</div>
<div style="display:flex;gap:4px;margin-top:4px">
<button class="btn-bc" onclick="broadcast()">📢 Broadcast</button>
<button class="btn-pms" onclick="sendPM()">💬 Send PM</button>
</div>
</div>
</div>
</div>

<script>
let ws=null,adminAuth=false,adminPass='',clientsData=[],myId=0;

function connect(){
const protocol=location.protocol==='https:'?'wss':'ws';
ws=new WebSocket(protocol+'://'+location.host);
ws.onopen=()=>console.log('Connected');
ws.onmessage=e=>{
try{const d=JSON.parse(e.data);
if(d.type==='welcome'){myId=d.clientId}
if(d.type==='admin-auth'){
if(d.success){adminAuth=true;document.getElementById('loginBox').style.display='none';document.getElementById('panel').classList.add('vis');updateClients(d.clients)}
else{document.getElementById('loginErr').textContent='Wrong password!'}
}
if(d.type==='clientList')updateClients(d.clients);
if(d.type==='system')addChat('system',d.text,'');
if(d.type==='msg')addChat('msg',d.text,d.fromName||d.from,d.from===myId,d.muted);
if(d.type==='pm')addChat('pm',d.text,d.fromName||d.from);
if(d.type==='pm-sent')addChat('admin-pm','📤 PM to Client '+d.targetId+': '+d.text,'YOU');
if(d.type==='muted-notice')addChat('system','🔇 Client '+d.from+' is muted but tried to talk','');
}catch(err){}
};
ws.onclose=()=>{addChat('system','⚠ Disconnected','')};
}
connect();

function login(){
adminPass=document.getElementById('adminPass').value;
ws.send(JSON.stringify({type:'admin-login',password:adminPass}));
}

function updateClients(list){
clientsData=list;
document.getElementById('clientCount').textContent=list.length;
document.getElementById('mutedCount').textContent=list.filter(c=>c.muted).length;
let html='';
list.forEach(c=>{
html+=`<div class="client-row">
<span>🟢 <span class="name">${c.name}</span> ${c.isAdmin?'<span class="admin-tag">[ADMIN]</span>':''} ${c.muted?'<span class="muted-tag">[MUTED]</span>':''} <span style="color:#555;font-size:.45rem">ID:${c.id}</span></span>
<div class="btns">
<button class="btn-pm" onclick="quickPM(${c.id},'${c.name}')">💬</button>
<button class="${c.muted?'btn-unmute':'btn-mute'}" onclick="toggleMute(${c.id})">${c.muted?'🔊':'🔇'}</button>
<button class="btn-kick" onclick="kick(${c.id})">Kick</button>
<button class="btn-ban" onclick="ban(${c.id})">Ban</button>
</div></div>`;
});
document.getElementById('clientList').innerHTML=html||'No clients';
// Update dropdown
const sel=document.getElementById('pmTarget');
sel.innerHTML='<option value="all">📢 Everyone</option>';
list.forEach(c=>{if(!c.isAdmin)sel.innerHTML+=`<option value="${c.id}">💬 ${c.name} (${c.id})</option>`});
}

function addChat(type,text,from,isMine,muted){
const box=document.getElementById('chatBox');
const d=document.createElement('div');
let cls='my',label='';
if(type==='msg'){cls=isMine?'ms':'mr';label=from||'Unknown';if(muted)cls+=' muted-msg'}
else if(type==='pm'){cls='mp';label='🔒 PM FROM '+from}
else if(type==='admin-pm'){cls='ma';label=from}
else if(type==='system'){cls='my'}
d.className='msg '+cls;
d.innerHTML=(label?`<div class="ml">${label}</div>`:'')+`<div class="mtx">${text}</div>`;
box.appendChild(d);box.scrollTop=box.scrollHeight;
}

function sendMsg(){
const msg=document.getElementById('chatMsg').value.trim();if(!msg)return;
const target=document.getElementById('pmTarget').value;
if(target==='all'){ws.send(JSON.stringify({type:'msg',text:msg}));addChat('msg',msg,'YOU (Public)',true)}
else{ws.send(JSON.stringify({type:'admin-pm',targetId:parseInt(target),text:msg,adminPassword:adminPass}));addChat('admin-pm','📤 To Client '+target+': '+msg,'YOU')}
document.getElementById('chatMsg').value='';
}

function sendPM(){
const msg=document.getElementById('chatMsg').value.trim();if(!msg)return;
const target=document.getElementById('pmTarget').value;
if(target==='all'){alert('Select a specific client for PM');return}
ws.send(JSON.stringify({type:'admin-pm',targetId:parseInt(target),text:msg,adminPassword:adminPass}));
addChat('admin-pm','📤 To Client '+target+': '+msg,'YOU');
document.getElementById('chatMsg').value='';
}

function broadcast(){
const msg=document.getElementById('chatMsg').value.trim()||'📢 Admin announcement';
ws.send(JSON.stringify({type:'admin-broadcast',text:msg,adminPassword:adminPass}));
addChat('system','📢 Broadcast: '+msg,'');
document.getElementById('chatMsg').value='';
}

function quickPM(id,name){
document.getElementById('pmTarget').value=id;
document.getElementById('chatMsg').focus();
document.getElementById('chatMsg').placeholder='PM to '+name+'...';
}

function kick(id){ws.send(JSON.stringify({type:'admin-kick',targetId:id,adminPassword:adminPass}))}
function ban(id){ws.send(JSON.stringify({type:'admin-ban',targetId:id,adminPassword:adminPass}))}
function toggleMute(id){ws.send(JSON.stringify({type:'admin-mute',targetId:id,adminPassword:adminPass}))}
function muteAll(){clientsData.forEach(c=>{if(!c.muted&&!c.isAdmin)ws.send(JSON.stringify({type:'admin-mute',targetId:c.id,adminPassword:adminPass}))})}
function unmuteAll(){clientsData.forEach(c=>{if(c.muted)ws.send(JSON.stringify({type:'admin-mute',targetId:c.id,adminPassword:adminPass}))})}
function kickAll(){clientsData.forEach(c=>{if(!c.isAdmin)ws.send(JSON.stringify({type:'admin-kick',targetId:c.id,adminPassword:adminPass}))})}

// Enter key to send
document.addEventListener('keydown',e=>{
if(e.key==='Enter'&&document.activeElement===document.getElementById('chatMsg')){e.preventDefault();sendMsg()}
if(e.key==='Enter'&&document.activeElement===document.getElementById('adminPass')){e.preventDefault();login()}
});
</script>
</body>
</html>
